<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア（高さを確実に固定して真っ白を防止） */
        .constellation-container {
            position: relative;
            width: 360px;  /* 横幅を固定 */
            height: 360px; /* 高さを固定 */
            margin: 30px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* ✨ 星（リンクボタン）の共通デザイン */
        .star-link {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #333333;
            border-radius: 50%;
            display: block;
            text-decoration: none;
            margin-top: -3px;
            margin-left: -3px;
            z-index: 10;
        }

        /* 🏷️ 星の下のラベル（常に表示、ワープロ明朝） */
        .star-label {
            position: absolute;
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            top: 10px; /* 星の10px下に表示 */
            left: 50%;
            transform: translateX(-50%);
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        /* ホバー効果 */
        .star-link:hover {
            background-color: #000000;
        }
        .star-link:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 しし座の正確なピクセル座標（画像から完全固定値で算出） */
        .lambda_nose   { top: 86px;  left: 316px; }
        .epsilon_eye   { top: 82px;  left: 284px; }
        .mu_head       { top: 57px;  left: 266px; }
        .zeta_adhafera { top: 86px;  left: 219px; }
        .gamma_algieba { top: 122px; left: 219px; }
        .eta_neck      { top: 151px; left: 244px; }
        /* レグルス（ここだけ9pxサイズ用に中心ズレ補正） */
        .alpha_regulus { top: 194px; left: 244px; width: 9px; height: 9px; margin-top: -4.5px; margin-left: -4.5px; } 
        .rho_frontfoot { top: 219px; left: 201px; }
        .theta_chertan { top: 162px; left: 100px; }
        .delta_zosma   { top: 111px; left: 100px; }
        .beta_denebola { top: 162px; left: 25px;  }

        /* ⚠️ 文字が長くて重なりそうな部分の位置微調整 */
        .alpha_regulus .star-label { top: 12px; }
        .beta_denebola .star-label { top: 12px; left: 15px; transform: none; } /* カタログ名が左に見切れないように */

    </style>
</head>
