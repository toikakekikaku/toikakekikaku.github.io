<!DOCTYPE html>
<html lang="ja">
<head>

    <title>しし座の完成</title>
    <style>
        body { margin: 0; padding: 20px; font-family: serif; display: flex; justify-content: center; background: #fff; }
        .constellation { position: relative; width: 450px; height: 400px; }
        .line { stroke: #aaa; stroke-width: 1; }
        .star { fill: #333; }
        .dot { fill: #ccc; }
        .label { font-size: 11px; }
    </style>
</head>
<body>
    <div class="constellation">
        <svg width="450" height="400">
            <line class="line" x1="400" y1="120" x2="350" y2="100" /> <line class="line" x1="350" y1="100" x2="300" y2="60" /> <line class="line" x1="300" y1="60" x2="300" y2="150" /> <line class="line" x1="300" y1="150" x2="150" y2="150" /> <line class="line" x1="150" y1="150" x2="80" y2="220" /> <line class="line" x1="80" y1="220" x2="200" y2="230" /> <line class="line" x1="200" y1="230" x2="130" y2="320" /> <line class="line" x1="200" y1="230" x2="300" y2="250" /> <circle class="star" cx="400" cy="120" r="3" /><text x="405" y="125" class="label">お知らせ</text>
            <circle class="star" cx="300" cy="60" r="3" /><text x="305" y="65" class="label">Bluesky</text>
            <circle class="star" cx="300" cy="150" r="3" /><text x="305" y="155" class="label">短歌</text>
            <circle class="star" cx="150" cy="150" r="3" /><text x="155" y="155" class="label">アーカイブ</text>
            <circle class="star" cx="80" cy="220" r="3" /><text x="85" y="225" class="label">フォーム</text>
            <circle class="star" cx="200" cy="230" r="3" /><text x="205" y="235" class="label">Twitter</text>
            <circle class="star" cx="130" cy="320" r="3" /><text x="135" y="325" class="label">日記</text>
            <circle class="star" cx="300" cy="250" r="5" /><text x="305" y="255" class="label" style="font-weight:bold;">文学フリマ福岡</text>

            <circle class="dot" cx="350" cy="100" r="2" />
            <circle class="dot" cx="250" cy="100" r="2" />
            <circle class="dot" cx="220" cy="190" r="2" />
            <circle class="dot" cx="350" cy="200" r="2" />
            <circle class="dot" cx="400" cy="250" r="2" />
            <circle class="dot" cx="50" cy="150" r="2" />
            <circle class="dot" cx="100" cy="100" r="2" />
            <circle class="dot" cx="100" cy="350" r="2" />
        </svg>
    </div>
</body>
</html>
