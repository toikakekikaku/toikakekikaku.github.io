<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア（枠なし・透明） */
        .constellation-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 360px; /* 文字を下に常時出すため高さを少し広げました */
            margin: 30px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線に変更） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;  /* 👈 上品で細い直線のグレー */
            stroke-width: 1px;
        }

        /* ✨ 星（リンクボタン）の共通デザイン */
        .star-link {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #333333;
            border-radius: 50%;
            display: block;
            text-decoration: none;
            margin-top: -3px;
            margin-left: -3px;
            z-index: 10;
        }

        /* 🏷️ 星の下のラベル（常に表示、ワープロ明朝） */
        .star-label {
            position: absolute;
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            top: 10px; /* 👈 星のすこし下に配置 */
            left: 50%;
            transform: translateX(-50%);
            text-decoration: underline; /* リンクと分かりやすいように下線 */
            transition: color 0.2s;
        }
        
        /* 星や文字にマウスが乗ったとき、少し濃くなる効果 */
        .star-link:hover {
            background-color: #000000;
        }
        .star-link:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 しし座の星の正確な中心座標（％指定） */
        .lambda_nose   { top: 24%; left: 88%; }
        .epsilon_eye   { top: 23%; left: 79%; }
        .mu_head       { top: 16%; left: 74%; }
        .zeta_adhafera { top: 24%; left: 61%; }
        .gamma_algieba { top: 34%; left: 61%; }
        .eta_neck      { top: 42%; left: 68%; }
        /* レグルス（主星：ここだけ9px） */
        .alpha_regulus { top: 54%; left: 68%; width: 9px; height: 9px; margin-top: -4.5px; margin-left: -4.5px; } 
        .rho_frontfoot { top: 61%; left: 56%; }
        .theta_chertan { top: 45%; left: 28%; }
        .delta_zosma   { top: 31%; left: 28%; }
        .beta_denebola { top: 45%; left: 7%;  }

        /* ⚠️ カタログとXは文字が長いため、重なりを防ぐ位置微調整 */
        .alpha_regulus .star-label { top: 12px; }
        .beta_denebola .star-label { top: 10px; left: 0%; transform: translateX(0); } /* 左端で見切れないよう調整 */

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座のふたり組ユニット</p>
