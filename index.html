<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア */
        .constellation-container {
            position: relative;
            width: 360px;
            height: 380px; 
            margin: 30px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* 📦 星と文字をセットにするブロック（真下に並べるための設定） */
        .star-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-decoration: none;
            z-index: 10;
            transform: translate(-50%, -2px); 
        }

        /* ✨ 星の形（✦）初期状態は少し優しいグレー */
        .star-shape {
            width: 4px;
            height: 4px;
            background-color: #666666; /* 👈 初期状態の星の色 */
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: rotate(45deg);
            /* 👈 色（background-color）と回転（transform）の両方を0.4秒かけて滑らかに変えます */
            transition: transform 0.4s ease, background-color 0.4s ease;
        }

        /* 🔄 カーソルを合わせたとき：星の色が真っ黒に変わって、225度まで回転する */
        .star-box:hover .star-shape {
            background-color: #000000; /* 👈 カーソルが乗ったときの星の色 */
            transform: rotate(225deg) scale(1.5); /* 👈 回転して少し大きくなる */
        }

        /* 🏷️ 星の真下のラベル（カーソルを合わせなくても最初からずっと表示） */
        .star-label {
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            margin-top: 6px; 
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        /* カーソルを合わせたときは文字の色も真っ黒に */
        .star-box:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 形を整えるためだけの名前なしの星（薄いグレーで固定） */
        .star-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #d1d1d1;
            z-index: 5;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* 📍 しし座の正確なピクセル座標 */
        .lambda_nose   { top: 86px;  left: 316px; } /* お知らせ */
        .epsilon_eye   { top: 82px;  left: 284px; } 
        .mu_head       { top: 57px;  left: 266px; } /* Bluesky */
        .zeta_adhafera { top: 86px;  left: 219px; } /* 短歌 */
        .gamma_algieba { top: 122px; left: 219px; } 
        .eta_neck      { top: 151px; left: 244px; } 
        
        /* 文学フリマ福岡（ここだけ星の初期サイズを少し大きめの7pxに） */
        .alpha_regulus { top: 194px; left: 244px; } 
        .alpha_regulus .star-shape { width: 7px; height: 7px; background-color: #444444; }
        .alpha_regulus:hover .star-shape { background-color: #000000; }
        
        .rho_frontfoot { top: 219px; left: 201px; } 
        .theta_chertan { top: 162px; left: 100px; } /* アーカイブ */
        .delta_zosma   { top: 111px; left: 100px; } 
        
        /* フォーム（端で見切れないように文字位置を微調整） */
        .beta_denebola { top: 162px; left: 25px; } 
        .beta_denebola .star-label { margin-left: 15px; } 

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座のふたり組ユニット</p>
    
    <div class="constellation-container">
        
        <svg class="constellation-lines" width="360" height="360">
            <line x1="316" y1="86"  x2="284" y2="82" />
            <line x1="284" y1="82"  x2="266" y2="57" />
            <line x1="266" y1="57"  x2="219" y2="86" />
            <line x1="219" y1="86"  x2="219" y2="122" />
            <line x1="219" y1="122" x2="244" y2="151" />
            <line x1="244" y1="151" x2="244" y2="194" />
            
            <line x1="244" y1="194" x2="201" y2="219" />
            <line x1="201" y1="219" x2="100" y2="162" />

            <line x1="219" y1="122" x2="100" y2="111" />
            <line x1="100" y1="111" x2="100" y2="162" />
            <line x1="100" y1="111" x2="25"  y2="162" />
            <line x1="100" y1="162" x2="25"  y2="162" />
        </svg>
        
        <a href="javascript:void(0)" class="star-box lambda_nose">
            <div class="star-shape"></div>
            <span class="star-label">お知らせ</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box mu_head">
            <div class="star-shape"></div>
            <span class="star-label">Bluesky</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box zeta_adhafera">
            <div class="star-shape"></div>
            <span class="star-label">短歌</span>
        </a>

        <a href="https://c.bunfree.net/c/sapporo11" target="_blank" class="star-box alpha_regulus">
            <div class="star-shape"></div>
            <span class="star-label" style="font-weight: bold;">文学フリマ福岡</span>
        </a>

        <a href="javascript:void(0)" class="star-box theta_chertan">
            <div class="star-shape"></div>
            <span class="star-label">アーカイブ</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box beta_denebola">
            <div class="star-shape"></div>
            <span class="star-label">フォーム</span>
        </a>

        <div class="star-dot" style="top: 82px; left: 284px;"></div>  
        <div class="star-dot" style="top: 122px; left: 219px;"></div> 
        <div class="star-dot" style="top: 151px; left: 244px;"></div> 
        <div class="star-dot" style="top: 219px; left: 201px;"></div> 
        <div class="star-dot" style="top: 111px; left: 100px;"></div> 

    </div>

    <p style="font-size: 13px; color: #888888; margin-top: 20px;">※星や文字をクリックするとリンク先にジャンプします。</p>

</body>
</html>
