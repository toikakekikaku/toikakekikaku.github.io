<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア */
        .constellation-container {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 30px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* ✨ 星の共通デザイン（丸から「微小な星型 ✦」に変更） */
        .star-link {
            position: absolute;
            width: 4px;   /* 👈 さらに小さく4pxに */
            height: 4px;  /* 👈 さらに小さく4pxに */
            background-color: #333333;
            display: block;
            text-decoration: none;
            margin-top: -2px;
            margin-left: -2px;
            z-index: 10;
            
            /* ✦ 特殊な形のクリップと回転で「傾いたシャープな星型」を作っています */
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: rotate(45deg); /* 👈 45度回してきらりとさせています */
            transition: transform 0.2s, background-color 0.2s;
        }

        /* ホバー時に星が少し大きくなって真っ黒になる効果 */
        .star-link:hover {
            transform: rotate(45deg) scale(1.5);
            background-color: #000000;
        }

        /* 🏷️ 星の下のラベル（常に表示、ワープロ明朝） */
        .star-label {
            position: absolute;
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            top: 10px;
            left: 50%;
            /* 星自体は45度回っていますが、文字は回転させずに真っ直ぐ表示します */
            transform: translateX(-50%) rotate(-45deg); 
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        .star-link:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 しし座の正確なピクセル座標 */
        .lambda_nose   { top: 86px;  left: 316px; } /* お知らせ */
        .epsilon_eye   { top: 82px;  left: 284px; } /* 星B */
        .mu_head       { top: 57px;  left: 266px; } /* Bluesky */
        .zeta_adhafera { top: 86px;  left: 219px; } /* 短歌 */
        .gamma_algieba { top: 122px; left: 219px; } /* 星D */
        .eta_neck      { top: 151px; left: 244px; } /* 星E */
        
        /* レグルス（主星：ここだけ少し大きめの星型 7px） */
        .alpha_regulus { 
            top: 194px; 
            left: 244px; 
            width: 7px; 
            height: 7px; 
            margin-top: -3.5px; 
            margin-left: -3.5px; 
        } 
        
        .rho_frontfoot { top: 219px; left: 201px; } /* 星F */
        .theta_chertan { top: 162px; left: 100px; } /* アーカイブ */
        .delta_zosma   { top: 111px; left: 100px; } /* 星G */
        .beta_denebola { top: 162px; left: 25px;  } /* X */

        /* ⚠️ 文字の位置微調整 */
        .alpha_regulus .star-label { top: 12px; }
        .beta_denebola .star-label { top: 12px; left: 15px; transform: rotate(-45deg); }

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座のふたり組ユニット</p>
    
    <div class="constellation-container">
        
        <svg class="constellation-lines" width="360" height="360">
            <line x1="316" y1="86"  x2="284" y2="82" />
            <line x1="284" y1="82"  x2="266" y2="57" />
            <line x1="266" y1="57"  x2="219" y2="86" />
            <line x1="219" y1="86"  x2="219" y2="122" />
            <line x1="219" y1="122" x2="244" y2="151" />
            <line x1="244" y1="151" x2="244" y2="194" />
            
            <line x1="244" y1="194" x2="201" y2="219" />
            <line x1="201" y1="219" x2="100" y2="162" />

            <line x1="219" y1="122" x2="100" y2="111" />
            <line x1="100" y1="111" x2="100" y2="162" />
            <line x1="100" y1="111" x2="25"  y2="162" />
            <line x1="100" y1="162" x2="25"  y2="162" />
        </svg>
        
        <a href="javascript:void(0)" class="star-link lambda_nose" title="お知らせ"><span class="star-label">お知らせ</span></a>
        <a href="javascript:void(0)" class="star-link epsilon_eye"><span class="star-label">星B</span></a>
        <a href="javascript:void(0)" class="star-link mu_head" title="Bluesky"><span class="star-label">Bluesky</span></a>
        <a href="javascript:void(0)" class="star-link zeta_adhafera" title="短歌"><span class="star-label">短歌</span></a>
        <a href="javascript:void(0)" class="star-link gamma_algieba"><span class="star-label">星D</span></a>
        <a href="javascript:void(0)" class="star-link eta_neck"><span class="star-label">星E</span></a>

        <a href="https://c.bunfree.net/c/sapporo11" target="_blank" class="star-link alpha_regulus" title="文学フリマWebカタログ">
            <span class="star-label" style="font-weight: bold;">文学フリマWebカタログ</span>
        </a>

        <a href="javascript:void(0)" class="star-link rho_frontfoot"><span class="star-label">星F</span></a>
        <a href="javascript:void(0)" class="star-link theta_chertan" title="アーカイブ"><span class="star-label">アーカイブ</span></a>
        <a href="javascript:void(0)" class="star-link delta_zosma"><span class="star-label">星G</span></a>
        
        <a href="https://x.com/あなたのユーザー名" target="_blank" class="star-link beta_denebola" title="X (Twitter)">
            <span class="star-label">X (Twitter)</span>
        </a>

    </div>

    <p style="font-size: 13px; color: #888888; margin-top: 20px;">※星や文字をクリックするとリンク先にジャンプします。</p>

</body>
</html>
