<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア */
        .constellation-container {
            position: relative;
            width: 360px;
            height: 340px; 
            margin: 40px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* 📦 星と文字をセットにするブロック */
        .star-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-decoration: none;
            z-index: 10;
            transform: translate(-50%, -2px); 
        }

        /* ✨ 星の形（✦）初期状態 */
        .star-shape {
            width: 4px;
            height: 4px;
            background-color: #666666; 
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: rotate(45deg);
            transition: transform 0.4s ease, background-color 0.4s ease;
        }

        /* 🔄 カーソルを合わせたとき効果 */
        .star-box:hover .star-shape {
            background-color: #000000; 
            transform: rotate(225deg) scale(1.5); 
        }

        /* 🏷️ 星の真下のラベル */
        .star-label {
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            margin-top: 6px; 
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        .star-box:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 形を整えるためだけの名前なしの星（薄いグレーで固定） */
        .star-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #d1d1d1;
            z-index: 5;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* 📍 星座図から算出したリアルな位置座標 */
        .lambda_nose   { top: 100px; left: 325px; } /* お知らせ（λ） */
        .epsilon_eye   { top: 96px;  left: 285px; } /* 名前なし（ε） */
        .mu_head       { top: 60px;  left: 260px; } /* Bluesky（μ） */
        .zeta_adhafera { top: 96px;  left: 205px; } /* 短歌（ζ） */
        
        /* 文学フリマ福岡（α:レグルス）高さを大幅に上げて底辺ラインを綺麗に */
        .alpha_regulus { top: 205px; left: 235px; } 
        .alpha_regulus .star-shape { width: 7px; height: 7px; background-color: #444444; }
        .alpha_regulus:hover .star-shape { background-color: #000000; }
        
        .theta_chertan { top: 180px; left: 110px; } /* アーカイブ（θ） */
        .delta_zosma   { top: 125px; left: 115px; } /* 名前なし（δ） */
        
        .beta_denebola { top: 185px; left: 25px;  } /* フォーム（β） */
        .beta_denebola .star-label { margin-left: 10px; } 

        /* 📊 カウンター専用のスタイル */
        .counter-area {
            font-size: 12px;
            color: #777777;
            margin-top: 30px;
            letter-spacing: 0.05em;
        }
        .counter-area span {
            margin: 0 8px;
            font-family: monospace;
        }

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座 of ふたり組ユニット</p>
    
    <div class="constellation-container">
        
        <svg class="constellation-lines" width="360" height="340">
            <line x1="325" y1="100" x2="285" y2="96" />  <line x1="285" y1="96"  x2="260" y2="60" />  <line x1="260" y1="60"  x2="205" y2="96" />  <line x1="205" y1="96"  x2="235" y2="205" /> <line x1="235" y1="205" x2="110" y2="180" /> <line x1="110" y1="180" x2="25"  y2="185" /> <line x1="205" y1="96"  x2="115" y2="125" /> <line x1="115" y1="125" x2="110" y2="180" /> <line x1="115" y1="125" x2="25"  y2="185" /> </svg>
        
        <a href="javascript:void(0)" class="star-box lambda_nose">
            <div class="star-shape"></div>
            <span class="star-label">お知らせ</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box mu_head">
            <div class="star-shape"></div>
            <span class="star-label">Bluesky</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box zeta_adhafera">
            <div class="star-shape"></div>
            <span class="star-label">短歌</span>
        </a>

        <a href="https://c.bunfree.net/c/sapporo11" target="_blank" class="star-box alpha_regulus">
            <div class="star-shape"></div>
            <span class="star-label" style="font-weight: bold;">文学フリマ福岡</span>
        </a>

        <a href="javascript:void(0)" class="star-box theta_chertan">
            <div class="star-shape"></div>
            <span class="star-label">アーカイブ</span>
        </a>
        
        <a href="javascript:void(0)" class="star-box beta_denebola">
            <div class="star-shape"></div>
            <span class="star-label">フォーム</span>
        </a>

        <div class="star-dot" style="top: 96px; left: 285px;"></div>  <div class="star-dot" style="top: 125px; left: 115px;"></div> </div>

    <div class="counter-area">
        今日:<span id="count-today">0</span>
        昨日:<span id="count-yesterday">0</span>
        合計:<span id="count-total">0</span>
    </div>

    <script>
        (function() {
            const now = new Date();
            const todayStr = now.getFullYear() + '-' + (now.getMonth() + 1) + '-' + now.getDate();
            
            let lastDate = localStorage.getItem('counter_last_date');
            let todayCount = parseInt(localStorage.getItem('counter_today') || '0', 10);
            let yesterCount = parseInt(localStorage.getItem('counter_yesterday') || '0', 10);
            let totalCount = parseInt(localStorage.getItem('counter_total') || '0', 10);

            if (!lastDate) {
                todayCount = 1; yesterCount = 0; totalCount = 1;
                localStorage.setItem('counter_last_date', todayStr);
            } else if (lastDate !== todayStr) {
                const lastParts = lastDate.split('-').map(Number);
                const lastDateObj = new Date(lastParts[0], lastParts[1] - 1, lastParts[2]);
                const diffTime = Math.abs(now - lastDateObj);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays === 1) { yesterCount = todayCount; } else { yesterCount = 0; }
                todayCount = 1; totalCount += 1;
                localStorage.setItem('counter_last_date', todayStr);
            } else {
                todayCount += 1; totalCount += 1;
            }

            localStorage.setItem('counter_today', todayCount);
            localStorage.setItem('counter_yesterday', yesterCount);
            localStorage.setItem('counter_total', totalCount);

            document.getElementById('count-today').textContent = todayCount;
            document.getElementById('count-yesterday').textContent = yesterCount;
            document.getElementById('count-total').textContent = totalCount;
        })();
    </script>

</body>
</html>
