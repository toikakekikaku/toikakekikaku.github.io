<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>しし座の星座構成</title>
    <style>
        body { margin: 0; padding: 20px; font-family: serif; display: flex; justify-content: center; background: #fff; }
        .constellation { position: relative; width: 400px; height: 400px; }
        .line { stroke: #aaa; stroke-width: 1; }
        .star { fill: #333; }
        .dot { fill: #ccc; }
        .label { font-size: 11px; }
    </style>
</head>
<body>
    <div class="constellation">
        <svg width="400" height="400">
            <circle class="dot" cx="50" cy="50" r="1" />
            <circle class="dot" cx="350" cy="30" r="1" />
            <circle class="dot" cx="100" cy="350" r="1" />
            <circle class="dot" cx="300" cy="380" r="1" />
            <circle class="dot" cx="20" cy="200" r="1" />
            <circle class="dot" cx="380" cy="200" r="1" />
            <circle class="dot" cx="150" cy="50" r="1" />
            <circle class="dot" cx="250" cy="300" r="1" />
            <circle class="dot" cx="80" cy="100" r="1" />
            <circle class="dot" cx="320" cy="120" r="1" />

            <line class="line" x1="340" y1="90" x2="280" y2="70" /> <line class="line" x1="280" y1="70" x2="260" y2="40" /> <line class="line" x1="260" y1="40" x2="260" y2="120" /> <line class="line" x1="260" y1="120" x2="120" y2="130" />
            
            <line class="line" x1="40" y1="180" x2="120" y2="130" />
            <line class="line" x1="120" y1="130" x2="200" y2="220" />
            <line class="line" x1="200" y1="220" x2="260" y2="230" /> <line class="line" x1="40" y1="180" x2="260" y2="230" /> <line class="line" x1="120" y1="130" x2="100" y2="300" /> <circle class="star" cx="340" cy="90" r="3" /><text x="345" y="95" class="label">お知らせ</text>
            <circle class="star" cx="260" cy="40" r="3" /><text x="265" y="45" class="label">Bluesky</text>
            <circle class="star" cx="260" cy="120" r="3" /><text x="265" y="125" class="label">短歌</text>
            <circle class="star" cx="120" cy="130" r="3" /><text x="125" y="135" class="label">アーカイブ</text>
            <circle class="star" cx="40" cy="180" r="3" /><text x="45" y="185" class="label">フォーム</text>
            <circle class="star" cx="200" cy="220" r="3" /><text x="205" y="225" class="label">Twitter</text>
            <circle class="star" cx="260" cy="230" r="5" /><text x="265" y="235" class="label" style="font-weight:bold;">文学フリマ福岡</text>
            <circle class="star" cx="100" cy="300" r="3" /><text x="105" y="305" class="label">日記</text>
        </svg>
    </div>
</body>
</html>
