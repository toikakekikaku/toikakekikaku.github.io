<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* 🌌 深い夜空の背景 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #0b132b; 
            color: #f4f5f6;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #ffffff;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #e0e1dd; }

        /* 🌟 しし座を描くエリア（幅を広げ、スマホで見切れないよう最大幅を制限） */
        .constellation-container {
            position: relative;
            width: 100%;
            max-width: 400px; /* 横幅を少し大きく確保 */
            height: 320px;    /* 高さもゆったりに調整 */
            margin: 30px auto;
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
        }

        /* 🗺️ SVGによる星座線 */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 1;
            stroke-dasharray: 2 2;
        }

        /* ✨ 星の共通デザイン（サイズを小さくしました） */
        .star-link {
            position: absolute;
            width: 6px;  /* 10pxから6pxに小さく変更 */
            height: 6px; /* 10pxから6pxに小さく変更 */
            background-color: #ffffff;
            border-radius: 50%;
            display: block;
            text-decoration: none;
            box-shadow: 0 0 6px #ffffff, 0 0 10px #64dfdf;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 10;
        }

        /* 星にマウスを乗せた（タップした）ときの効果 */
        .star-link:hover {
            transform: scale(1.6);
            box-shadow: 0 0 10px #ffb703, 0 0 20px #ffb703;
            background-color: #ffb703;
        }

        /* 🏷️ 星のラベル（ホバー時だけ綺麗に浮かび上がるように変更） */
        .star-label {
            position: absolute;
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #ffb703;
            white-space: nowrap;
            top: -25px; /* 星の上に表示 */
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(11, 19, 43, 0.85); /* 背景を暗くして文字を読みやすく */
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 183, 3, 0.3);
            opacity: 0; /* 普段は隠す */
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        
        /* 星に触れたら文字を表示 */
        .star-link:hover .star-label {
            opacity: 1;
            visibility: visible;
        }

        /* 📍 しし座の9つの星の配置（エリア拡大に合わせてパーセントで綺麗に分散） */
        .rasalas_head { top: 12%; left: 45%; }
        .alterf       { top: 20%; left: 32%; }
        .adhafera     { top: 32%; left: 36%; }
        .algieba      { top: 42%; left: 45%; }
        /* レグルス（一番輝く主星：ここだけ少し大きめの10px） */
        .regulus      { top: 68%; left: 50%; width: 10px; height: 10px; box-shadow: 0 0 10px #ffffff, 0 0 18px #ffb703; }
        .subra        { top: 80%; left: 36%; }
        .chertan      { top: 74%; left: 70%; }
        .zosma        { top: 48%; left: 80%; }
        .denebola     { top: 55%; left: 92%; }

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座のふたり組ユニット</p>
    
    <div class="constellation-container">
        
        <svg class="constellation-lines" viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%;">
            <line x1="45" y1="12" x2="32" y2="20" />
            <line x1="32" y1="20" x2="36" y2="32" />
            <line x1="36" y1="32" x2="45" y2="42" />
            <line x1="45" y1="42" x2="50" y2="68" />
            <line x1="50" y1="68" x2="36" y2="80" />
            <line x1="50" y1="68" x2="70" y2="74" />
            <line x1="70" y1="74" x2="80" y2="48" />
            <line x1="80" y1="48" x2="45" y2="42" />
            <line x1="80" y1="48" x2="92" y2="55" />
        </svg>
        
        <a href="javascript:void(0)" class="star-link rasalas_head"><span class="star-label">星A</span></a>
        <a href="javascript:void(0)" class="star-link alterf"><span class="star-label">星B</span></a>
        
        <a href="javascript:void(0)" class="star-link adhafera" title="短歌">
            <span class="star-label">短歌</span>
        </a>

        <a href="javascript:void(0)" class="star-link algieba"><span class="star-label">星C</span></a>

        <a href="https://c.bunfree.net/c/sapporo11" target="_blank" class="star-link regulus" title="文学フリマWebカタログ">
            <span class="star-label" style="font-weight: bold;">文学フリマWebカタログ</span>
        </a>

        <a href="javascript:void(0)" class="star-link subra"><span class="star-label">星D</span></a>
        
        <a href="javascript:void(0)" class="star-link chertan" title="アーカイブ">
            <span class="star-label">アーカイブ</span>
        </a>

        <a href="javascript:void(0)" class="star-link zosma"><span class="star-label">星E</span></a>
        
        <a href="https://x.com/あなたのユーザー名" target="_blank" class="star-link denebola" title="X (Twitter)">
            <span class="star-label">X (Twitter)</span>
        </a>

    </div>

    <p style="font-size: 13px; color: #8d99ae; margin-top: 20px;">※星に触れるとリンク名が浮かび上がります。</p>

</body>
</html>
