<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア */
        .constellation-container {
            position: relative;
            width: 360px;
            height: 380px; 
            margin: 30px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* 📦 星と文字をセットにするブロック（真下に並べるための設定） */
        .star-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-decoration: none;
            z-index: 10;
            transform: translate(-50%, -2px); 
        }

        /* ✨ 星の形（✦）初期状態 */
        .star-shape {
            width: 4px;
            height: 4px;
            background-color: #666666; 
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: rotate(45deg);
            transition: transform 0.4s ease, background-color 0.4s ease;
        }

        /* 🔄 カーソルを合わせたとき効果 */
        .star-box:hover .star-shape {
            background-color: #000000; 
            transform: rotate(225deg) scale(1.5); 
        }

        /* 🏷️ 星の真下のラベル */
        .star-label {
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            margin-top: 6px; 
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        .star-box:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 形を整えるためだけの名前なしの星（薄いグレーで固定） */
        .star-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #d1d1d1;
            z-index: 5;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* 📍 修正後のしし座ピクセル座標 */
        .lambda_nose   { top: 86px;  left: 316px; } /* お知らせ */
        .epsilon_eye   { top: 82px;  left: 284px; } /* 名前なし（頭） */
        .mu_head       { top: 57px;  left: 266px; } /* Bluesky */
        .zeta_adhafera { top: 86px;  left: 219px; } /* 短歌 */
        
        /* 文学フリマ福岡（底辺の右端：少し大きめの星型 7px） */
        .alpha_regulus { top: 194px; left: 244px; } 
        .alpha_regulus .star-shape { width: 7px; height: 7px; background-color: #444444; }
        .alpha_regulus:hover .star-shape { background-color: #000000; }
        
        .theta_chertan { top: 162px; left: 130px; } /* アーカイブ（底辺の中央：位置を少し右寄りに調整） */
        .delta_zosma   { top: 111px; left: 130px; } /* 名前なし（背中：アーカイブの真上） */
        
        .beta_denebola { top: 162px; left: 25px;  } /* フォーム（底辺の左端） */
        .beta_denebola .star-label { margin-left: 15px; } 

        /* 📊 カウンター専用のスタイル */
        .counter-area {
            font-size: 12px;
            color: #777777;
            margin-top: 30px;
            letter-spacing: 0.05em;
        }
        .counter-area span {
            margin: 0 8px;
            font-family: monospace; /* 数字を等幅にして見やすく */
        }

    </style>
</head>
