        .star-label { font-size: 11px; color: #555555; margin-top: 6px; text-decoration: underline; }
        /* 無数の灰色の星 */
        .star-dot { position: absolute; width: 3px; height: 3px; background-color: #d1d1d1; z-index: 5; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
