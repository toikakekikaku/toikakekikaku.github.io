    <title>トイカケ企画</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア */
        .constellation-container {
            position: relative;
            width: 360px;
            height: 420px; 
            margin: 40px auto;
            background-color: transparent;
            border: none;
        }

        /* 🗺️ SVGによる星座線（細い直線） */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .constellation-lines line {
            stroke: #cccccc;
            stroke-width: 1px;
        }

        /* 📦 星と文字をセットにするブロック */
        .star-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-decoration: none;
            z-index: 10;
            transform: translate(-50%, -2px); 
        }

        /* ✨ 星の形（✦）初期状態 */
        .star-shape {
            width: 4px;
            height: 4px;
            background-color: #666666; 
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: rotate(45deg);
            transition: background-color 0.3s ease;
        }

        /* 🔄 カーソルを合わせたときずっと回転し続ける */
        .star-box:hover .star-shape {
            background-color: #000000; 
            animation: spin-infinite 1.2s linear infinite; 
        }

        @keyframes spin-infinite {
            0% { transform: rotate(45deg) scale(1.4); }
            100% { transform: rotate(405deg) scale(1.4); } 
        }

        /* 🏷️ 星の真下のラベル */
        .star-label {
            font-size: 13px;
            font-family: 'WapuroMincho', serif;
            color: #555555;
            white-space: nowrap;
            margin-top: 6px; 
            text-decoration: underline;
            transition: color 0.2s;
        }
        
        .star-box:hover .star-label {
            color: #000000;
            font-weight: bold;
        }

        /* 📍 形を整えるためだけの名前なしの星（デザインとして保護） */
        .star-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #d1d1d1;
            z-index: 5;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        /* 📍 星座図の骨格座標 */
        .lambda_nose   { top: 105px; left: 345px; } /* お知らせ（λ） */
        .epsilon_eye   { top: 92px;  left: 295px; } /* 名前なし（ε：目） */
        .mu_head       { top: 55px;  left: 265px; } /* Bluesky（μ） */
        .zeta_adhafera { top: 112px; left: 205px; } /* 短歌（ζ） */
        
        /* 文学フリマ福岡（α:レグルス） */
        .alpha_regulus { top: 220px; left: 265px; } 
        .alpha_regulus .star-shape { width: 7px; height: 7px; background-color: #444444; }

        /* 短歌の星を大きくする */
        .zeta_adhafera .star-shape {  width: 7px;  height: 7px; }
        .theta_chertan { top: 180px; left: 115px; } /* アーカイブ（θ） */
        .delta_zosma   { top: 125px; left: 120px; } /* 名前なし（δ：背中） */
        .beta_denebola { top: 185px; left: 25px;  } /* フォーム（β） */

        /* 足の座標 */
        .star_iota     { top: 240px; left: 90px;  } /* 名前なし（ι：左足関節） */
        .star_sigma    { top: 300px; left: 95px;  } /* 日記（σ：左足先） */
        
        .star_rho      { top: 260px; left: 190px; } /* Twitter（ρ：前足関節） */
        .star_omicron  { top: 240px; left: 345px; } /* 名前なし（ο：右足先） */

        /* ⚠️ 文字位置の微調整 */
        .beta_denebola .star-label { margin-left: 10px; } 
        .star_rho .star-label { margin-left: 25px; } 

        /* 📊 カウンター専用のスタイル */
        .counter-area {
            font-size: 12px;
            color: #777777;
            margin-top: 30px;
            letter-spacing: 0.05em;
        }
        .counter-area span {
            margin: 0 8px;
            font-family: monospace;
        }
