<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文学フリマ 出店紹介</title>
    <style>
        @font-face {
            font-family: 'WapuroMincho';
            src: url('https://irori.github.io/wapuro-mincho/wapuro-mincho.woff2') format('woff2');
        }
        
        /* ⚪ 白黒ベースのシンプルな背景と文字 */
        body {
            font-family: 'WapuroMincho', serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #ffffff;
            color: #333333;
            text-align: center;
            line-height: 1.8;
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            color: #111111;
            letter-spacing: 0.1em;
        }
        
        p { font-size: 16px; margin-bottom: 20px; color: #444444; }

        /* 🌟 しし座を描くエリア（背景の枠と色を完全に消去） */
        .constellation-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 340px;
            margin: 30px auto;
            background-color: transparent; /* 👈 背景を透明に */
            border: none;                  /* 👈 枠線を消去 */
        }

        /* 🗺️ SVGによる星座線 */
        .constellation-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .constellation-lines line {
            stroke: #b1b1b1;       /* 線の色は少し淡いグレーにして上品に */
            stroke-width: 1px;
            stroke-dasharray: 1 3; /* 👈 さらに細かく、サラサラした極小ドットに */
        }

        /* ✨ 星の共通デザイン */
        .star-link {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #333333;
            border-radius: 50%;
            display: block;
            text-decoration: none;
            /* ズレ防止：星の中心（3px分）を基準点にする設定 */
            margin-top: -3px;
            margin-left: -3px;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 10;
        }

        /* 星にマウスを乗せた（タップした）ときの効果 */
        .star-link:hover {
            transform: scale(1.6);
            background-color: #000000;
        }

        /* 🏷️ 星のラベル */
        .star-label {
            position: absolute;
            font-size: 11px;
            font-family: 'WapuroMincho', serif;
            color: #ffffff;
            white-space: nowrap;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
        }
        
        .star-link:hover .star-label {
            opacity: 1;
            visibility: visible;
        }

        /* 📍 しし座の星の正確な中心座標（％指定） */
        .lambda_nose   { top: 24%; left: 88%; }
        .epsilon_eye   { top: 23%; left: 79%; }
        .mu_head       { top: 16%; left: 74%; }
        .zeta_adhafera { top: 24%; left: 61%; }
        .gamma_algieba { top: 34%; left: 61%; }
        .eta_neck      { top: 42%; left: 68%; }
        /* レグルスだけサイズが違う（9px）のでズレ補正を上書き */
        .alpha_regulus { top: 54%; left: 68%; width: 9px; height: 9px; margin-top: -4.5px; margin-left: -4.5px; } 
        .rho_frontfoot { top: 61%; left: 56%; }
        .theta_chertan { top: 45%; left: 28%; }
        .delta_zosma   { top: 31%; left: 28%; }
        .beta_denebola { top: 45%; left: 7%;  }

    </style>
</head>
<body>

    <h1>トイカケ企画</h1>
    <p>夏生まれ獅子座のふたり組ユニット</p>
    
    <div class="constellation-container">
        
        <svg class="constellation-lines" viewBox="0 0 100 100" preserveAspectRatio="none" style="width:100%; height:100%;">
            <line x1="88" y1="24" x2="79" y2="23" />
            <line x1="79" y1="23" x2="74" y2="16" />
            <line x1="74" y1="16" x2="61" y2="24" />
            <line x1="61" y1="24" x2="61" y2="34" />
            <line x1="61" y1="34" x2="68" y2="42" />
            <line x1="68" y1="42" x2="68" y2="54" />
            
            <line x1="68" y1="54" x2="56" y2="61" />
            <line x1="56" y1="61" x2="28" y2="45" />

            <line x1="61" y1="34" x2="28" y2="31" />
            <line x1="28" y1="31" x2="28" y2="45" />
            <line x1="28" y1="31" x2="7"  y2="45" />
            <line x1="28" y1="45" x2="7"  y2="45" />
        </svg>
        
        <a href="javascript:void(0)" class="star-link lambda_nose"><span class="star-label">星A</span></a>
        <a href="javascript:void(0)" class="star-link epsilon_eye"><span class="star-label">星B</span></a>
        <a href="javascript:void(0)" class="star-link mu_head"><span class="star-label">星C</span></a>
        
        <a href="javascript:void(0)" class="star-link zeta_adhafera" title="短歌">
            <span class="star-label">短歌</span>
        </a>

        <a href="javascript:void(0)" class="star-link gamma_algieba"><span class="star-label">星D</span></a>
        <a href="javascript:void(0)" class="star-link eta_neck"><span class="star-label">星E</span></a>

        <a href="https://c.bunfree.net/c/sapporo11" target="_blank" class="star-link alpha_regulus" title="文学フリマWebカタログ">
            <span class="star-label" style="font-weight: bold;">文学フリマWebカタログ</span>
        </a>

        <a href="javascript:void(0)" class="star-link rho_frontfoot"><span class="star-label">星F</span></a>
        
        <a href="javascript:void(0)" class="star-link theta_chertan" title="アーカイブ">
            <span class="star-label">アーカイブ</span>
        </a>

        <a href="javascript:void(0)" class="star-link delta_zosma"><span class="star-label">星G</span></a>
        
        <a href="https://x.com/あなたのユーザー名" target="_blank" class="star-link beta_denebola" title="X (Twitter)">
            <span class="star-label">X (Twitter)</span>
        </a>

    </div>

    <p style="font-size: 13px; color: #888888; margin-top: 20px;">※星に触れるとリンク名が浮かび上がります。</p>

</body>
</html>
